services:
  mysql:
    image: mysql:8.0
    container_name: software_subscription_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-MyRootPass123}
      MYSQL_DATABASE: software_subscription
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-AppPass123}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: software_subscription_app
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "server=mysql;port=3306;database=software_subscription;user=${MYSQL_USER:-appuser};password=${MYSQL_PASSWORD:-AppPass123};"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - appnet
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`dayan3.devtscape.org`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=8080"
      # Uncomment for HTTPS with Let's Encrypt:
      # - "traefik.http.routers.app.entrypoints=websecure"
      # - "traefik.http.routers.app.tls=true"
      # - "traefik.http.routers.app.tls.certresolver=letsencrypt"

volumes:
  mysql_data:

networks:
  appnet:
    driver: bridge
  # Must match the network used by your existing Traefik. Check with: docker network ls
  traefik_default:
    external: true
