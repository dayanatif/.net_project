version: "3.8"

services:
  app:
    build: .
    container_name: dotnet_app
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=server=db;port=3306;database=software_subscription;user=root;password=
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dotnet.rule=Host(`dayan3.devtscape.org`)"
      - "traefik.http.routers.dotnet.entrypoints=web"

  db:
    image: mysql:8.1
    container_name: mysql_db
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: