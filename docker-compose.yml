services:
  mysql:
    image: mysql:8.0
    container_name: software_subscription_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-MyRootPass123}
      MYSQL_DATABASE: software_subscription
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-AppPass123}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: software_subscription_app
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "server=mysql;port=3306;database=software_subscription;user=${MYSQL_USER:-appuser};password=${MYSQL_PASSWORD:-AppPass123};"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - appnet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`dayan3.devtscape.org`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=8080"
      # Uncomment for HTTPS with Let's Encrypt:
      # - "traefik.http.routers.app.entrypoints=websecure"
      # - "traefik.http.routers.app.tls=true"
      # - "traefik.http.routers.app.tls.certresolver=letsencrypt"

  traefik:
    image: traefik:v3.0
    container_name: software_subscription_traefik
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Uncomment for Let's Encrypt:
      # - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      # - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # - "--certificatesresolvers.letsencrypt.acme.email=raodayanatif@gmail.com"
      # - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      # - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # For Let's Encrypt persistence:
      # - traefik_certs:/letsencrypt
    depends_on:
      - app
    networks:
      - appnet

volumes:
  mysql_data:
  # traefik_certs:  # Uncomment for Let's Encrypt

networks:
  appnet:
    driver: bridge
